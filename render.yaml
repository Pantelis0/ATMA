services:
  - type: web
    name: atma-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: ./scripts/start-api.sh
    healthCheckPath: /health
    autoDeploy: false

  - type: worker
    name: atma-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: ./scripts/start-worker.sh
    autoDeploy: false
